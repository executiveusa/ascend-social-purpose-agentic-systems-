services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    env_file: ../.env
    ports:
      - "4000:4000"
    volumes:
      - mission_data:/app/mission-data
      - mission_icm:/app/icm
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    env_file: ../.env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mission
      POSTGRES_PASSWORD: mission
      POSTGRES_DB: mission_os
    volumes:
      - mission_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  mission_data:
  mission_icm:
  mission_pg:
