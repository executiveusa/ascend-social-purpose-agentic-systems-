# Mission OS v0.6 — Managed Docker Compose
# Generated by missionctl bundle up. Extends v0.5 production compose.
# Do not edit directly — regenerate with missionctl.

services:
  # --- v0.5 base services (unchanged) ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.managed
    volumes:
      - mission-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mission-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: .env.managed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./mission-data:/app/mission-data
      - ./icm:/app/icm

  site:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    env_file: .env.managed
    depends_on:
      - mission-api

  # --- v0.6 managed services ---
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    env_file: .env.managed
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hermes:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    restart: unless-stopped
    env_file: hermes/env
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./hermes:/app/config:ro
      - hermes-data:/app/data
    depends_on:
      - mission-api
      - litellm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    env_file: open-webui/env
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      - litellm

  langfuse-web:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    env_file: langfuse/env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Observability ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file: .env.managed
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/mission-os.json:ro
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - prometheus

  # --- Reverse proxy ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.managed:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - site
      - mission-api
      - litellm
      - hermes
      - open-webui
      - langfuse-web

volumes:
  mission-postgres:
  redis-data:
  hermes-data:
  openwebui-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:
