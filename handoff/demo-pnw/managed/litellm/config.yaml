# LiteLLM Config — Generated by missionctl
# Model gateway for demo-pnw
# Surfaces: mission-os, openwebui, hermes-founder, hermes-grants, hermes-comms, hermes-programs, hermes-volunteers, hermes-impact

model_list:
  # Cheap tier — local or low-cost models
  - model_name: cheap
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://ollama:11434

  # Standard tier — balanced cost/quality
  - model_name: standard
    litellm_params:
      model: openai/gpt-4.1-mini
      api_key: os.environ/LITELLM_OPENAI_API_KEY

  # Critical tier — high-stakes decisions
  - model_name: critical
    litellm_params:
      model: anthropic/claude-sonnet-4.5
      api_key: os.environ/LITELLM_ANTHROPIC_API_KEY

  # Fallback group
  - model_name: standard-fallback
    litellm_params:
      model: openai/gpt-4.1-mini
      api_key: os.environ/LITELLM_OPENAI_API_KEY
    fallbacks:
      - cheap

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 30

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DB_URL
  # Budget routing
  budget_ratio: 1.0

# Per-surface virtual keys (generated at provision time)
# Each surface gets its own key with scoped budget
virtual_keys:
  - alias: mission-os
    models: ["cheap", "standard", "critical"]
    max_budget: 50.0
    tpm_limit: 10000
  - alias: openwebui
    models: ["cheap", "standard"]
    max_budget: 30.0
    tpm_limit: 5000
  - alias: hermes-founder
    models: ["standard"]
    max_budget: 20.0
    tpm_limit: 5000
  - alias: hermes-grants
    models: ["standard"]
    max_budget: 25.0
    tpm_limit: 5000
  - alias: hermes-comms
    models: ["cheap"]
    max_budget: 10.0
    tpm_limit: 3000
  - alias: hermes-programs
    models: ["cheap"]
    max_budget: 10.0
    tpm_limit: 3000
  - alias: hermes-volunteers
    models: ["cheap"]
    max_budget: 10.0
    tpm_limit: 3000
  - alias: hermes-impact
    models: ["standard"]
    max_budget: 15.0
    tpm_limit: 5000
