# Prometheus Config — Mission OS v0.6
global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: mission-api
    static_configs:
      - targets: ['mission-api:4000']
    metrics_path: /metrics

  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics

  - job_name: hermes
    static_configs:
      - targets: ['hermes:8765']
    metrics_path: /metrics

  - job_name: langfuse
    static_configs:
      - targets: ['langfuse-web:3000']
    metrics_path: /api/health
